<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Canvas — Planner Pro × Strategy Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F6FA;
  --surface: #FFFFFF;
  --surface-2: #F0F1F8;
  --border: #E2E5EF;
  --border-strong: #C8CCDC;
  --text-primary: #1A1D2E;
  --text-secondary: #5A6080;
  --text-muted: #9094AA;
  --accent: #4F46E5;
  --accent-light: #EEF0FF;
  --accent-hover: #4338CA;
  --success: #16A34A;
  --warning: #D97706;
  --danger: #DC2626;
  --info: #0284C7;
  --shadow-sm: 0 1px 3px rgba(26,29,46,0.06), 0 1px 2px rgba(26,29,46,0.04);
  --shadow-md: 0 4px 12px rgba(26,29,46,0.08), 0 2px 4px rgba(26,29,46,0.04);
  --shadow-lg: 0 12px 32px rgba(26,29,46,0.12), 0 4px 8px rgba(26,29,46,0.06);
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  /* Campaign type colors */
  --brand: #7C3AED;
  --product-launch: #0EA5E9;
  --seasonal: #F59E0B;
  --promo: #EF4444;
  --content: #10B981;
  --always-on: #6366F1;

  /* Campaign group colors */
  --group-spring: #3B82F6;
  --group-summer: #F97316;
  --group-golden: #EF4444;
  --group-yearend: #22C55E;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
}

/* ===== LAYOUT ===== */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ===== HEADER ===== */
.app-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
}

.app-logo-mark {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 700;
}

.header-project {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  padding: 4px 10px;
  background: var(--surface-2);
  border-radius: 6px;
  border: 1px solid var(--border);
}

.header-spacer { flex: 1; }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: var(--font);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--text-primary); }

.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn-outline:hover { background: var(--accent-light); }

.btn-primary {
  background: var(--accent);
  color: white;
  border: 1px solid var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-icon {
  padding: 7px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: var(--radius);
}
.btn-icon:hover { background: var(--surface-2); color: var(--text-primary); }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.1s;
  opacity: 1;
}

.filter-chip .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.filter-chip:hover { opacity: 0.8; }
.filter-chip.muted { opacity: 0.35; }

.filter-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

/* ===== BODY ===== */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== IDEAS POOL (STRATEGY STUDIO STYLE) ===== */
.ideas-pool {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.ideas-pool.collapsed {
  width: 44px;
}

.pool-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.pool-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
}

.ideas-pool.collapsed .pool-title { display: none; }

.pool-count {
  font-size: 11px;
  font-weight: 600;
  background: var(--accent-light);
  color: var(--accent);
  padding: 1px 7px;
  border-radius: 10px;
  white-space: nowrap;
}

.ideas-pool.collapsed .pool-count { display: none; }

.pool-toggle {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-muted);
  border: none;
  background: transparent;
  transition: all 0.1s;
  flex-shrink: 0;
}
.pool-toggle:hover { background: var(--surface-2); color: var(--text-primary); }

.ideas-pool.collapsed .pool-toggle { margin: 0 auto; }

.pool-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px;
}

.ideas-pool.collapsed .pool-body { display: none; }

.idea-card {
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.idea-card:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.idea-card::before {
  content: '💡';
  font-size: 11px;
  position: absolute;
  top: 10px;
  left: -1px;
  width: 18px;
  text-align: center;
  opacity: 0.7;
}

.idea-card-inner { padding-left: 12px; }

.idea-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  line-height: 1.3;
}

.idea-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.idea-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.idea-status {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.idea-status.tbd { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
.idea-status.review { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }

.idea-channel {
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
}

.idea-note {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 5px;
  line-height: 1.4;
}

/* ===== CANVAS AREA ===== */
.canvas-area {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--bg);
  cursor: default;
}

/* Campaign group band behind cards */
.group-band {
  position: absolute;
  top: 48px;
  bottom: 0;
  left: 200px;
  right: 0;
  pointer-events: none;
  z-index: 0;
}

.group-overlay {
  position: absolute;
  border-radius: 4px;
  opacity: 0.06;
  transition: opacity 0.2s;
}

.canvas-area:hover .group-overlay { opacity: 0.08; }

/* Campaign group connector label */
.group-label {
  position: absolute;
  top: 50px;
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: none;
}

.group-label-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 4px;
  color: white;
  white-space: nowrap;
}

.group-label-line {
  height: 2px;
  background: currentColor;
  opacity: 0.4;
}

/* ===== TIMELINE STRUCTURE ===== */
.timeline-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  height: 48px;
}

.timeline-label-col {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.timeline-months {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.timeline-month {
  flex: 1;
  min-width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  border-right: 1px solid var(--border);
  position: relative;
}

.timeline-month:last-child { border-right: none; }

.timeline-month-label { white-space: nowrap; overflow: hidden; }

.timeline-month.wk {
  min-width: 32px;
  flex: 0 0 32px;
  font-size: 10px;
  font-weight: 400;
  color: var(--text-muted);
}

/* ===== SWIMLANE ===== */
.swimlane {
  display: flex;
  align-items: stretch;
  min-height: 80px;
  border-bottom: 1px solid var(--border);
  position: relative;
  background: var(--surface);
}

.swimlane:hover { background: #FAFAFC; }

.swimlane-label {
  width: 200px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding: 12px 16px;
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 10;
  gap: 8px;
}

.swimlane-label-icon {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 1px;
}

.swimlane-label-text { flex: 1; }

.swimlane-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}

.swimlane-count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.swimlane-cards-area {
  flex: 1;
  position: relative;
  min-height: 80px;
  padding: 8px 0;
}

/* ===== PLAN CARDS ===== */
.plan-card {
  position: absolute;
  top: 8px;
  height: calc(100% - 16px);
  border-radius: var(--radius);
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
  border-left: 3px solid transparent;
  box-shadow: var(--shadow-sm);
}

.plan-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  z-index: 10;
}

.plan-card.selected {
  box-shadow: 0 0 0 2px var(--accent), var(--shadow-md);
  z-index: 11;
}

.plan-card-top {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  justify-content: space-between;
}

.plan-card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  flex: 1;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.plan-card-type {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 1px;
}

.plan-card-bottom {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}

.plan-card-dates {
  font-size: 10px;
  color: rgba(255,255,255,0.75);
  font-weight: 500;
}

.plan-card-status {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

.plan-card-owner {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  gap: 3px;
}

.owner-avatar {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
}

/* Status badge colors */
.status-active { background: rgba(255,255,255,0.25); color: white; }
.status-planned { background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.9); }
.status-review { background: #FCD34D; color: #713F12; }

/* Campaign type color coding for plan cards */
.type-brand { background: var(--brand); border-left-color: #6D28D9; }
.type-product-launch { background: var(--product-launch); border-left-color: #0284C7; }
.type-seasonal { background: var(--seasonal); border-left-color: #D97706; }
.type-promo { background: var(--promo); border-left-color: #DC2626; }
.type-content { background: var(--content); border-left-color: #059669; }
.type-always-on { background: var(--always-on); border-left-color: #4F46E5; }

.type-brand .plan-card-type { background: rgba(255,255,255,0.2); color: white; }
.type-product-launch .plan-card-type { background: rgba(255,255,255,0.2); color: white; }
.type-seasonal .plan-card-type { background: rgba(255,255,255,0.2); color: white; }
.type-promo .plan-card-type { background: rgba(255,255,255,0.2); color: white; }
.type-content .plan-card-type { background: rgba(255,255,255,0.2); color: white; }
.type-always-on .plan-card-type { background: rgba(255,255,255,0.2); color: white; }

/* ===== MILESTONES ===== */
.milestone {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 14px;
  height: 14px;
  border: 2px solid;
  background: var(--surface);
  z-index: 6;
  cursor: pointer;
  transition: all 0.15s;
}

.milestone:hover {
  transform: translate(-50%, -50%) rotate(45deg) scale(1.3);
  z-index: 12;
}

.milestone-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
  background: var(--text-primary);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 20;
}

.milestone:hover .milestone-tooltip { opacity: 1; }

/* ===== DETAIL PANEL ===== */
.detail-panel {
  width: 300px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.detail-panel.collapsed { width: 0; border-left: none; }

.detail-panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.detail-type-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 4px;
}

.detail-type-badge.plan { background: var(--accent-light); color: var(--accent); }
.detail-type-badge.idea { background: #FEF3C7; color: #92400E; }
.detail-type-badge.milestone { background: #FEE2E2; color: #991B1B; }

.detail-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  flex: 1;
  line-height: 1.3;
}

.detail-panel-close {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-muted);
  transition: all 0.1s;
}
.detail-panel-close:hover { background: var(--surface-2); color: var(--text-primary); }

.detail-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
}

.detail-section {
  margin-bottom: 18px;
}

.detail-section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

.detail-field {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}

.detail-field-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  width: 72px;
  flex-shrink: 0;
  padding-top: 3px;
}

.detail-field-value {
  flex: 1;
  font-size: 12px;
  color: var(--text-primary);
  line-height: 1.5;
}

.detail-field input,
.detail-field select,
.detail-field textarea {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 12px;
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--surface);
  transition: border-color 0.1s;
}

.detail-field input:focus,
.detail-field select:focus,
.detail-field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.detail-field textarea {
  resize: vertical;
  min-height: 60px;
  line-height: 1.4;
}

.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.detail-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.detail-group-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  color: white;
}

.detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  text-align: center;
  padding: 24px;
}

.detail-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
.detail-empty-text { font-size: 13px; font-weight: 500; }
.detail-empty-sub { font-size: 11px; margin-top: 4px; opacity: 0.7; }

/* ===== SVG CONNECTOR OVERLAY ===== */
#group-connectors {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

.connector-path {
  fill: none;
  stroke-width: 2;
  stroke-dasharray: 5 3;
  opacity: 0.5;
}

/* ===== QUICK ADD ===== */
.quick-add-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;

const MILESTONES = [
  { id: 'm1', title: 'Final Creative Approval', date: '2026-02-24', type: 'approval', group: 'spring' },
  { id: 'm2', title: 'Public Launch', date: '2026-03-05', type: 'launch', group: 'spring' },
  { id: 'm3', title: 'Summer Launch Review', date: '2026-06-05', type: 'review', group: 'summer' },
  { id: 'm4', title: 'Offer Lock', date: '2026-09-08', type: 'deadline', group: 'golden' },

];

const IDEAS = [
  { id: 'i1', title: 'Partnership-led Awareness Burst', note: 'Consider co-branded collab with lifestyle partners for April — high reach potential', channel: 'Brand', status: 'tbd', tags: ['partnership', 'apr'] },
  { id: 'i2', title: 'New User Referral Mechanic', note: 'Summer referral program to drive new user acquisition — needs product & growth alignment', channel: 'Promo', status: 'tbd', tags: ['referral', 'summer', 'acq'] },
  { id: 'i3', title: 'Creator Collaboration Wave', note: 'September creator burst aligned with back-to-school/early-fall —UGC heavy', channel: 'Content', status: 'review', tags: ['creator', 'sep', 'ugc'] },
  { id: 'i4', title: 'VIP Year-End Early Access', note: 'Exclusive early access for top-tier customers before holiday sale — retention play', channel: 'Brand', status: 'tbd', tags: ['vip', 'yearend', 'retention'] },
  { id: 'i5', title: 'Brand Film Concept', note: 'Pending budget sign-off — 60s brand story film for mid-year release', channel: 'Content', status: 'review', tags: ['video', 'brand', 'budget-pending'] },
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

let activeFilters = {
  types: new Set(['brand', 'product-launch', 'seasonal', 'promo', 'content', 'always-on']),
  statuses: new Set(['active', 'planned', 'review']),
};
let selectedItem = null;
let ideasPanelOpen = true;

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function dateToPercent(dateStr) {
  const d = new Date(dateStr);
  const days = Math.floor((d - YEAR_START) / (1000 * 60 * 60 * 24));
  return (days / TOTAL_DAYS) * 100;
}

function dateWidth(startStr, endStr) {
  const start = new Date(startStr);
  const end = new Date(endStr);
  const days = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
  return (days / TOTAL_DAYS) * 100;
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateRange(start, end) {
  return `${formatDateShort(start)} – ${formatDateShort(end)}`;
}

function getMilestoneColor(type) {
  const map = { launch: '#10B981', approval: '#7C3AED', review: '#0EA5E9', event: '#F97316', deadline: '#EF4444' };
  return map[type] || '#6366F1';
}

function getOwnerInitials(name) {
  return name.split(' ').map(n => n[0]).join('');
}

function getStatusClass(status) {
  if (status === 'active') return 'status-active';
  if (status === 'review') return 'status-review';
  return 'status-planned';
}

function getTypeLabel(type) {
  const map = { brand: 'Brand', 'product-launch': 'Product', seasonal: 'Seasonal', promo: 'Promo', content: 'Content', 'always-on': 'Always-on' };
  return map[type] || type;
}

// ═══════════════════════════════════════════════════════════
// RENDER: MONTH TIMELINE
// ═══════════════════════════════════════════════════════════

function renderTimeline() {
  const container = document.getElementById('timelineMonths');
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  container.innerHTML = months.map(m => `<div class="timeline-month"><span class="timeline-month-label">${m} 2026</span></div>`).join('');
}

// ═══════════════════════════════════════════════════════════
// RENDER: SWIMLANES + CARDS
// ═══════════════════════════════════════════════════════════

function renderSwimlanes() {
  const container = document.getElementById('swimlanes');
  container.innerHTML = '';

  SWIMLANES.forEach(lane => {
    const laneItems = PLAN_ITEMS.filter(p => p.type === lane.id);
    const visibleItems = laneItems.filter(p =>
      activeFilters.types.has(p.type) && activeFilters.statuses.has(p.status)
    );

    const laneEl = document.createElement('div');
    laneEl.className = 'swimlane';
    laneEl.dataset.type = lane.id;

    // Label
    laneEl.innerHTML = `
      <div class="swimlane-label">
        <div class="swimlane-label-icon" style="background:${lane.color}22;color:${lane.color};">
          ${lane.icon}
        </div>
        <div class="swimlane-label-text">
          <div class="swimlane-name">${lane.name}</div>
          <div class="swimlane-count">${visibleItems.length} of ${laneItems.length} items</div>
        </div>
      </div>
      <div class="swimlane-cards-area" id="lane-${lane.id}">
        ${visibleItems.map(p => renderPlanCard(p, lane)).join('')}
      </div>
    `;
    container.appendChild(laneEl);
  });

  // Render milestones after swimlanes are in DOM
  requestAnimationFrame(() => renderMilestones());
}

function renderPlanCard(plan, lane) {
  const left = dateToPercent(plan.start);
  const width = dateWidth(plan.start, plan.end);
  const group = CAMPAIGN_GROUPS.find(g => g.id === plan.group);

  return `
    <div class="plan-card type-${plan.type}${selectedItem?.id === plan.id ? ' selected' : ''}"
         id="card-${plan.id}"
         style="left:${left}%;width:${width}%;border-top:3px solid ${lane.color};"
         onclick="selectItem('${plan.id}')">
      <div class="plan-card-top">
        <div class="plan-card-title">${plan.title}</div>
        <div class="plan-card-type" style="color:${lane.color};background:${lane.color}18;">${getTypeLabel(plan.type)}</div>
      </div>
      <div class="plan-card-bottom">
        <span class="plan-card-status ${getStatusClass(plan.status)}">${plan.status}</span>
        <span class="plan-card-dates">${formatDateRange(plan.start, plan.end)}</span>
        <span class="plan-card-owner">
          <span class="owner-avatar">${getOwnerInitials(plan.owner)}</span>
          ${plan.owner.split(' ')[0]}
        </span>
      </div>
    </div>
  `;
}

function renderMilestones() {
  MILESTONES.forEach(ms => {
    const group = CAMPAIGN_GROUPS.find(g => g.id === ms.group);
    const left = dateToPercent(ms.date);
    const msColor = getMilestoneColor(ms.type);

    // Milestone for each swimlane row
    SWIMLANES.forEach(lane => {
      const laneArea = document.getElementById(`lane-${lane.id}`);
      if (!laneArea) return;
      const existing = laneArea.querySelector(`[data-milestone="${ms.id}"]`);
      if (existing) return;

      const el = document.createElement('div');
      el.className = 'milestone';
      el.dataset.milestone = ms.id;
      el.style.left = `${left}%`;
      el.style.borderColor = msColor;
      el.onclick = (e) => { e.stopPropagation(); selectMilestone(ms.id); };
      el.innerHTML = `<div class="milestone-tooltip" style="background:${msColor}">${ms.title} · ${formatDateShort(ms.date)}</div>`;
      laneArea.appendChild(el);
    });
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER: GROUP BANDS (background color overlays)
// ═══════════════════════════════════════════════════════════

function renderGroupBands() {
  const band = document.getElementById('groupBand');
  band.innerHTML = '';
  CAMPAIGN_GROUPS.forEach(g => {
    const left = dateToPercent(g.start);
    const width = dateWidth(g.start, g.end);
    const el = document.createElement('div');
    el.className = 'group-overlay';
    el.style.left = `${left}%`;
    el.style.width = `${width}%`;
    el.style.top = '0';
    el.style.bottom = '0';
    el.style.background = g.color;
    band.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER: CAMPAIGN GROUP LABELS (floating)
// ═══════════════════════════════════════════════════════════

function renderGroupLabels() {
  const canvas = document.getElementById('canvasArea');
  // Remove old labels
  canvas.querySelectorAll('.group-label').forEach(el => el.remove());

  CAMPAIGN_GROUPS.forEach(g => {
    const left = dateToPercent(g.start);
    const label = document.createElement('div');
    label.className = 'group-label';
    label.style.left = `${left + 200}px`; // account for label col
    label.innerHTML = `
      <div class="group-label-badge" style="background:${g.color}">${g.name}</div>
      <div class="group-label-line" style="width:40px;background:${g.color};opacity:0.5;"></div>
    `;
    canvas.appendChild(label);
  });
}

// ═══════════════════════════════════════════════════════════
// RENDER: IDEAS POOL
// ═══════════════════════════════════════════════════════════

function renderIdeas() {
  const body = document.getElementById('ideasPoolBody');
  const count = document.getElementById('ideasCount');
  count.textContent = IDEAS.length;
  body.innerHTML = IDEAS.map(idea => `
    <div class="idea-card${selectedItem?.id === idea.id ? ' selected' : ''}" id="idea-${idea.id}" onclick="selectIdea('${idea.id}')">
      <div class="idea-card-inner">
        <div class="idea-title">${idea.title}</div>
        <div class="idea-meta">
          <span class="idea-tag">${idea.channel}</span>
          <span class="idea-status ${idea.status}">${idea.status === 'tbd' ? 'TBD' : 'Review'}</span>
          <span class="idea-channel">${idea.tags.slice(0,2).map(t => '#'+t).join(' ')}</span>
        </div>
        <div class="idea-note">${idea.note}</div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// SELECTION & DETAIL PANEL
// ═══════════════════════════════════════════════════════════

function selectItem(id) {
  const plan = PLAN_ITEMS.find(p => p.id === id);
  if (!plan) return;
  selectedItem = { type: 'plan', data: plan };
  updateSelection();
  renderDetailPanel();
}

function selectIdea(id) {
  const idea = IDEAS.find(i => i.id === id);
  if (!idea) return;
  selectedItem = { type: 'idea', data: idea };
  updateSelection();
  renderDetailPanel();
}

function selectMilestone(id) {
  const ms = MILESTONES.find(m => m.id === id);
  if (!ms) return;
  selectedItem = { type: 'milestone', data: ms };
  updateSelection();
  renderDetailPanel();
}

function updateSelection() {
  document.querySelectorAll('.plan-card.selected, .idea-card.selected').forEach(el => el.classList.remove('selected'));
  if (selectedItem?.type === 'plan') {
    const el = document.getElementById(`card-${selectedItem.data.id}`);
    if (el) el.classList.add('selected');
  }
  if (selectedItem?.type === 'idea') {
    const el = document.getElementById(`idea-${selectedItem.data.id}`);
    if (el) el.classList.add('selected');
  }
}

function closeDetailPanel() {
  selectedItem = null;
  updateSelection();
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-empty">
      <div class="detail-empty-icon">⬚</div>
      <div class="detail-empty-text">No item selected</div>
      <div class="detail-empty-sub">Click any card, idea, or milestone to view its details</div>
    </div>`;
  document.getElementById('detailTitle').textContent = 'Select an item';
}

function renderDetailPanel() {
  if (!selectedItem) return;
  const { type, data } = selectedItem;

  const titleEl = document.getElementById('detailTitle');
  const badgeEl = document.getElementById('detailTypeBadge');
  const body = document.getElementById('detailBody');

  if (type === 'plan') {
    const plan = data;
    const lane = SWIMLANES.find(l => l.id === plan.type);
    const group = CAMPAIGN_GROUPS.find(g => g.id === plan.group);
    badgeEl.className = 'detail-type-badge plan';
    badgeEl.textContent = 'Plan Item';
    titleEl.textContent = plan.title;

    body.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">Schedule</div>
        <div class="detail-field">
          <div class="detail-field-label">Start</div>
          <div class="detail-field-value">
            <input type="date" value="${plan.start}" onchange="updatePlanField('${plan.id}','start',this.value)">
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">End</div>
          <div class="detail-field-value">
            <input type="date" value="${plan.end}" onchange="updatePlanField('${plan.id}','end',this.value)">
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Duration</div>
          <div class="detail-field-value">${Math.floor((new Date(plan.end) - new Date(plan.start)) / (1000*60*60*24)) + 1} days</div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Classification</div>
        <div class="detail-field">
          <div class="detail-field-label">Type</div>
          <div class="detail-field-value">
            <select onchange="updatePlanField('${plan.id}','type',this.value)">
              ${SWIMLANES.map(l => `<option value="${l.id}" ${l.id === plan.type ? 'selected' : ''}>${l.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Status</div>
          <div class="detail-field-value">
            <select onchange="updatePlanField('${plan.id}','status',this.value)">
              <option value="planned" ${plan.status === 'planned' ? 'selected' : ''}>Planned</option>
              <option value="active" ${plan.status === 'active' ? 'selected' : ''}>Active</option>
              <option value="review" ${plan.status === 'review' ? 'selected' : ''}>In Review</option>
            </select>
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Owner</div>
          <div class="detail-field-value">
            <input type="text" value="${plan.owner}" onchange="updatePlanField('${plan.id}','owner',this.value)">
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Campaign Group</div>
        <div class="detail-field">
          <div class="detail-field-value">
            ${group ? `<div class="detail-group-badge" style="background:${group.color}">${group.name}</div>` : '<span style="color:var(--text-muted)">Ungrouped</span>'}
            ${group ? `<div style="margin-top:6px;font-size:11px;color:var(--text-secondary);line-height:1.4;">${group.objective}</div>` : ''}
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Tags</div>
        <div class="detail-tags">
          ${plan.tags.map(t => `<span class="detail-tag">#${t}</span>`).join('')}
          <span class="detail-tag" style="color:var(--accent);cursor:pointer;">+ Add tag</span>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Notes</div>
        <div class="detail-field">
          <div class="detail-field-value">
            <textarea placeholder="Add notes...">${plan.notes || ''}</textarea>
          </div>
        </div>
      </div>
    `;
  }

  if (type === 'idea') {
    const idea = data;
    badgeEl.className = 'detail-type-badge idea';
    badgeEl.textContent = '💡 Idea';
    titleEl.textContent = idea.title;

    body.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">Classification</div>
        <div class="detail-field">
          <div class="detail-field-label">Channel</div>
          <div class="detail-field-value">
            <select>
              ${SWIMLANES.map(l => `<option value="${l.id}" ${l.name === idea.channel ? 'selected' : ''}>${l.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Status</div>
          <div class="detail-field-value">
            <select>
              <option value="tbd" ${idea.status === 'tbd' ? 'selected' : ''}>TBD — Needs scoping</option>
              <option value="review" ${idea.status === 'review' ? 'selected' : ''}>Under Review</option>
            </select>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Description</div>
        <div class="detail-field">
          <div class="detail-field-value">
            <textarea style="min-height:80px;">${idea.note}</textarea>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Tags</div>
        <div class="detail-tags">
          ${idea.tags.map(t => `<span class="detail-tag">#${t}</span>`).join('')}
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Actions</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-outline" style="flex:1;font-size:12px;" onclick="alert('Convert to Plan Item — prototype')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Convert to Plan
          </button>
          <button class="btn btn-ghost" style="flex:1;font-size:12px;">Schedule →</button>
        </div>
      </div>
    `;
  }

  if (type === 'milestone') {
    const ms = data;
    const group = CAMPAIGN_GROUPS.find(g => g.id === ms.group);
    badgeEl.className = 'detail-type-badge milestone';
    badgeEl.textContent = '◆ Milestone';
    titleEl.textContent = ms.title;

    body.innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">Details</div>
        <div class="detail-field">
          <div class="detail-field-label">Date</div>
          <div class="detail-field-value">
            <input type="date" value="${ms.date}">
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Type</div>
          <div class="detail-field-value">
            <select>
              <option value="launch" ${ms.type === 'launch' ? 'selected' : ''}>🚀 Launch</option>
              <option value="review" ${ms.type === 'review' ? 'selected' : ''}>👁️ Review</option>
              <option value="approval" ${ms.type === 'approval' ? 'selected' : ''}>✓ Approval</option>
              <option value="event" ${ms.type === 'event' ? 'selected' : ''}>🎪 Event</option>
              <option value="deadline" ${ms.type === 'deadline' ? 'selected' : ''}>⏰ Deadline</option>
            </select>
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Campaign</div>
          <div class="detail-field-value">
            ${group ? `<div class="detail-group-badge" style="background:${group.color}">${group.name}</div>` : 'None'}
          </div>
        </div>
      </div>
    `;
  }
}

function updatePlanField(id, field, value) {
  const plan = PLAN_ITEMS.find(p => p.id === id);
  if (!plan) return;
  plan[field] = value;
  renderSwimlanes();
  renderDetailPanel();
}

// ═══════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════

function toggleTypeFilter(type) {
  if (activeFilters.types.has(type)) {
    activeFilters.types.delete(type);
  } else {
    activeFilters.types.add(type);
  }
  updateFilterUI();
  renderSwimlanes();
}

function toggleStatusFilter(status) {
  if (activeFilters.statuses.has(status)) {
    activeFilters.statuses.delete(status);
  } else {
    activeFilters.statuses.add(status);
  }
  updateFilterUI();
  renderSwimlanes();
}

function updateFilterUI() {
  document.querySelectorAll('[data-type]').forEach(el => {
    const type = el.dataset.type;
    el.classList.toggle('muted', !activeFilters.types.has(type));
  });
  document.querySelectorAll('[data-status]').forEach(el => {
    const status = el.dataset.status;
    el.classList.toggle('muted', !activeFilters.statuses.has(status));
  });
}

function resetFilters() {
  activeFilters.types = new Set(['brand', 'product-launch', 'seasonal', 'promo', 'content', 'always-on']);
  activeFilters.statuses = new Set(['active', 'planned', 'review']);
  updateFilterUI();
  renderSwimlanes();
}

function toggleFilterPanel() {
  const bar = document.getElementById('filterBar');
  bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
}

// ═══════════════════════════════════════════════════════════
// PNG EXPORT
// ═══════════════════════════════════════════════════════════

async function exportPNG() {
  const el = document.getElementById('app');
  try {
    const canvas = await html2canvas(el, {
      backgroundColor: '#F5F6FA',
      scale: 1.5,
      useCORS: true,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = 'marketing-canvas-fy2026.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    console.error('Export failed:', e);
    alert('PNG export failed — check console');
  }
}

  renderTimeline();

init();
