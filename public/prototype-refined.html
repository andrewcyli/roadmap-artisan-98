<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Canvas — Refined Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #F5F6FA;
      --surface: #FFFFFF;
      --surface-2: #EEF1F8;
      --surface-3: #E7EAF4;
      --border: #DCE1EE;
      --border-strong: #C5CEE1;
      --text: #1E1B4B;
      --text-soft: #55527A;
      --muted: #8A89A8;
      --accent: #4F46E5;
      --accent-soft: rgba(79, 70, 229, 0.10);
      --shadow-sm: 0 1px 2px rgba(30, 27, 75, 0.06), 0 4px 14px rgba(30, 27, 75, 0.04);
      --shadow-md: 0 12px 32px rgba(30, 27, 75, 0.10);
      --bar-height: 24px;
      --row-gap: 8px;
      --lane-label-width: 148px;
      --panel-width: 320px;
      --ideas-width: 264px;
      --day-width: 3.08px;
      --lane-header-height: 44px;
      --group-band-top: 52px;
      --radius: 10px;
      --brand: #7C3AED;
      --product: #0EA5E9;
      --seasonal: #F59E0B;
      --promo: #EF4444;
      --content: #10B981;
      --alwayson: #6366F1;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    button, input, select { font: inherit; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 52px 1fr;
      background: var(--bg);
    }

    .topbar, .filters {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
    }
    .brandmark {
      width: 28px; height: 28px; border-radius: 999px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white; display: grid; place-items: center;
      font-weight: 800; font-size: 12px;
      box-shadow: var(--shadow-sm);
    }
    .title { font-weight: 700; font-size: 15px; }
    .subtitle {
      color: var(--text-soft); font-size: 12px; padding: 5px 10px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px;
    }
    .spacer { flex: 1; }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      border-radius: 10px;
      height: 34px;
      padding: 0 12px;
      display: inline-flex; align-items: center; gap: 7px;
      cursor: pointer;
      transition: .16s ease;
    }
    .btn:hover { border-color: var(--border-strong); color: var(--text); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { filter: brightness(0.96); }
    .btn.small { height: 30px; padding: 0 10px; font-size: 12px; }

    .filters { flex-wrap: wrap; padding-top: 8px; padding-bottom: 8px; }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); font-weight: 700;
    }
    .chip {
      height: 28px; padding: 0 10px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--text-soft); cursor: pointer; font-size: 12px; font-weight: 600;
      transition: .15s ease;
    }
    .chip:hover { transform: translateY(-1px); }
    .chip.active { background: var(--accent-soft); border-color: rgba(79, 70, 229, .22); color: var(--accent); }
    .chip.dimmed { opacity: .35; }
    .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
    .divider { width: 1px; height: 24px; background: var(--border); }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--ideas-width) minmax(0,1fr) 0px;
      transition: grid-template-columns .24s ease;
    }
    .workspace.detail-open { grid-template-columns: var(--ideas-width) minmax(0,1fr) var(--panel-width); }
    .workspace.ideas-collapsed { grid-template-columns: 44px minmax(0,1fr) 0px; }
    .workspace.ideas-collapsed.detail-open { grid-template-columns: 44px minmax(0,1fr) var(--panel-width); }

    .ideas {
      background: rgba(255,255,255,.86);
      border-right: 1px solid var(--border);
      min-width: 0; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .ideas-header {
      height: 48px; display:flex; align-items:center; gap: 10px;
      padding: 0 12px; border-bottom: 1px solid var(--border);
    }
    .ideas-title { font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--text-soft); flex: 1; }
    .ideas-count { font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-soft); padding: 4px 8px; border-radius: 999px; }
    .ideas-body { padding: 12px; overflow: auto; }
    .workspace.ideas-collapsed .ideas-title,
    .workspace.ideas-collapsed .ideas-count,
    .workspace.ideas-collapsed .ideas-body { display: none; }
    .workspace.ideas-collapsed .ideas-header { justify-content: center; padding: 0; }
    .idea-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      cursor: pointer; transition: .16s ease;
    }
    .idea-card:hover { transform: translateY(-2px); border-color: rgba(79,70,229,.28); }
    .idea-title-row { display:flex; align-items:flex-start; gap:8px; }
    .idea-bulb { width: 18px; flex: 0 0 18px; text-align:center; }
    .idea-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .idea-note { font-size: 12px; color: var(--text-soft); margin-top: 8px; line-height: 1.45; }
    .idea-meta { display:flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 10px; font-weight: 700; color: var(--text-soft); background: var(--surface-2); border-radius: 999px; padding: 4px 7px; }

    .main {
      min-width: 0; min-height: 0; display:flex; flex-direction:column;
    }

    .canvas-shell {
      flex: 1; min-height: 0; overflow: auto; position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.75)),
        radial-gradient(circle at top left, rgba(79,70,229,.06), transparent 42%);
    }

    .canvas {
      min-width: 1420px;
      padding: 18px 18px 80px;
    }

    .timeline-frame {
      position: relative;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-md);
      overflow: visible;
    }

    .timeline-toolbar {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(248,249,253,.88));
      border-top-left-radius: 18px; border-top-right-radius: 18px;
      position: sticky; top: 0; z-index: 25;
    }
    .toolbar-title { font-size: 14px; font-weight: 700; }
    .toolbar-note { font-size: 12px; color: var(--text-soft); }
    .segmented {
      display:inline-flex; padding: 3px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px;
      gap: 3px;
    }
    .segmented button {
      height: 28px; border: 0; background: transparent; color: var(--text-soft); border-radius: 999px; padding: 0 10px; cursor: pointer; font-size: 12px; font-weight: 700;
    }
    .segmented button.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

    .header-row {
      display: grid;
      grid-template-columns: var(--lane-label-width) 1fr;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 58px; z-index: 22; background: rgba(248,249,253,.96); backdrop-filter: blur(10px);
    }
    .header-cell {
      height: 54px; display:flex; align-items:center; padding: 0 16px;
      border-right: 1px solid var(--border);
      font-weight: 700; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    }
    .months {
      position: relative; display: grid; grid-template-columns: repeat(12, minmax(86px,1fr));
    }
    .month {
      height: 54px; position: relative; border-right: 1px solid var(--border);
      display:flex; align-items:center; justify-content:center; font-size: 12px; font-weight: 700; color: var(--text-soft);
    }
    .month:last-child { border-right: 0; }
    .month::after {
      content: attr(data-quarter);
      position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 800; color: rgba(79,70,229,.52);
    }

    .timeline-body { position: relative; }
    .group-layer, .milestone-layer, .indicator-layer {
      position: absolute; left: var(--lane-label-width); right: 0; pointer-events: none;
    }
    .group-layer { top: 54px; z-index: 1; }
    .milestone-layer { top: 54px; z-index: 4; }
    .indicator-layer { inset: 54px 0 0 var(--lane-label-width); z-index: 40; }

    .group-band {
      position: absolute; height: 16px; border-radius: 999px;
      background: rgba(79,70,229,.09); border: 1px solid rgba(79,70,229,.12);
      display:flex; align-items:center; padding: 0 8px; gap: 8px;
      color: var(--text-soft); font-size: 10px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    .group-band::before, .group-band::after {
      content: ''; width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: .35;
    }

    .lane {
      display: grid; grid-template-columns: var(--lane-label-width) 1fr;
      min-height: 88px; border-bottom: 1px solid var(--border);
      position: relative;
    }
    .lane-label {
      position: sticky; left: 0; z-index: 12;
      background: rgba(247,248,252,.96);
      border-right: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: flex-start; justify-content: center; flex-direction: column; gap: 6px;
      cursor: pointer;
    }
    .lane-label:hover { background: rgba(239,241,248,.96); }
    .lane-label.active-filter { box-shadow: inset 3px 0 0 var(--accent); }
    .lane-title { font-size: 13px; font-weight: 700; }
    .lane-sub { font-size: 11px; color: var(--muted); }
    .lane-track {
      position: relative; min-height: 0;
      background:
        repeating-linear-gradient(to right,
          transparent 0,
          transparent calc(var(--day-width) * 7 - 1px),
          rgba(79,70,229,.06) calc(var(--day-width) * 7 - 1px),
          rgba(79,70,229,.06) calc(var(--day-width) * 7)
        ),
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(247,248,252,.72));
      overflow: visible;
    }
    .lane-track.month-snap {
      background:
        linear-gradient(to right,
          transparent 0,
          transparent calc(8.333% - 1px), rgba(79,70,229,.10) calc(8.333% - 1px), rgba(79,70,229,.10) 8.333%,
          transparent 8.333%, transparent calc(16.666% - 1px), rgba(79,70,229,.10) calc(16.666% - 1px), rgba(79,70,229,.10) 16.666%,
          transparent 16.666%, transparent calc(25% - 1px), rgba(79,70,229,.10) calc(25% - 1px), rgba(79,70,229,.10) 25%,
          transparent 25%, transparent calc(33.333% - 1px), rgba(79,70,229,.10) calc(33.333% - 1px), rgba(79,70,229,.10) 33.333%,
          transparent 33.333%, transparent calc(41.666% - 1px), rgba(79,70,229,.10) calc(41.666% - 1px), rgba(79,70,229,.10) 41.666%,
          transparent 41.666%, transparent calc(50% - 1px), rgba(79,70,229,.10) calc(50% - 1px), rgba(79,70,229,.10) 50%,
          transparent 50%, transparent calc(58.333% - 1px), rgba(79,70,229,.10) calc(58.333% - 1px), rgba(79,70,229,.10) 58.333%,
          transparent 58.333%, transparent calc(66.666% - 1px), rgba(79,70,229,.10) calc(66.666% - 1px), rgba(79,70,229,.10) 66.666%,
          transparent 66.666%, transparent calc(75% - 1px), rgba(79,70,229,.10) calc(75% - 1px), rgba(79,70,229,.10) 75%,
          transparent 75%, transparent calc(83.333% - 1px), rgba(79,70,229,.10) calc(83.333% - 1px), rgba(79,70,229,.10) 83.333%,
          transparent 83.333%, transparent calc(91.666% - 1px), rgba(79,70,229,.10) calc(91.666% - 1px), rgba(79,70,229,.10) 91.666%,
          transparent 91.666%, transparent calc(100% - 1px), rgba(79,70,229,.10) calc(100% - 1px), rgba(79,70,229,.10) 100%
        ),
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(247,248,252,.72));
    }

    .plan {
      position: absolute;
      box-shadow: 0 2px 8px rgba(30,27,75,.08);
      cursor: default;
      transition: box-shadow .12s ease;
      z-index: 10;
      user-select: none;
      overflow: visible;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .plan:hover { box-shadow: 0 4px 16px rgba(30,27,75,.12); }
    .plan.drag-armed { box-shadow: 0 0 0 3px rgba(79,70,229,.18), 0 10px 24px rgba(30,27,75,.16); }
    .plan.dragging, .plan.resizing { z-index: 28; }
    .plan.selected { box-shadow: 0 0 0 3px rgba(79,70,229,.22), 0 4px 16px rgba(30,27,75,.14); }

    /* Row 1: bar + title (flex row) */
    .plan-bar-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .plan-bar {
      flex: 0 0 auto;
      display: flex; align-items: center;
      border-radius: 999px;
      padding: 0 10px;
      color: rgba(255,255,255,.95);
      font-size: 11px; font-weight: 700;
      letter-spacing: -.01em;
      white-space: nowrap; overflow: visible;
      height: 14px; min-height: 14px;
      min-width: 30px;
      position: relative;
    }
    .plan-title-out { position: absolute; left: calc(100% + 6px); top: 0;
      font-size: 11px; font-weight: 700;
      white-space: nowrap; color: var(--text);
      flex-shrink: 0;
    }
    .plan-title-in {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      font-size: 11px; font-weight: 700; white-space: nowrap;
      color: rgba(255,255,255,.95);
    }
    .plan-dates { font-size: 10px; opacity: .9; flex: 0 0 auto; white-space: nowrap; color: rgba(255,255,255,.85); margin-left: 4px; }

    .resize-handle {
      position: absolute; top: 1px; bottom: 1px; width: 8px; border-radius: 999px; opacity: 0;
      transition: opacity .12s ease, background .12s ease;
    }
    .resize-handle.left { left: 2px; cursor: ew-resize; }
    .resize-handle.right { right: 2px; cursor: ew-resize; }
    .plan:hover .resize-handle, .plan.resizing .resize-handle { opacity: 1; }
    .resize-handle:hover { background: rgba(255,255,255,.24); }

    /* Row 2: meta tags (single line, no wrap) */
    .density-extra {
      display: flex; align-items: center; gap: 4px;
      flex-wrap: nowrap; overflow: visible;
      padding: 3px 0 0;
      font-size: 11px; color: var(--text-soft);
      min-height: 16px;
    }
    .meta-pill {
      padding: 2px 6px; border-radius: 999px;
      background: rgba(79,70,229,.08); color: var(--text-soft);
      font-size: 10px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }

    /* Row 3: description (comprehensive only) */
    .plan-desc {
      font-size: 11px; color: var(--text-soft);
      line-height: 1.35; padding: 3px 0 0;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      max-height: 52px;
    }

    .milestone {
      position: absolute; width: 0; top: 0; bottom: 0; border-left: 1px dashed rgba(79,70,229,.26);
    }
    .milestone::before {
      content: ''; position: absolute; top: 12px; left: -5px;
      width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(79,70,229,.10);
    }
    .milestone-label {
      position: absolute; top: 0; left: 10px;
      font-size: 10px; font-weight: 800; color: var(--accent);
      background: rgba(255,255,255,.9); border: 1px solid rgba(79,70,229,.12); border-radius: 999px; padding: 4px 8px;
      white-space: nowrap;
    }

    .snap-indicator {
      position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent);
      box-shadow: 0 0 0 6px rgba(79,70,229,.10);
      border-radius: 999px;
      display: none;
    }
    .snap-indicator.visible { display: block; }
    .snap-label {
      position: absolute; top: 12px; left: 8px;
      background: var(--accent); color: white; border-radius: 999px; padding: 5px 8px;
      font-size: 10px; font-weight: 800; white-space: nowrap;
    }

    .panel {
      border-left: 1px solid var(--border);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      min-width: 0; display:flex; flex-direction:column;
      transform: translateX(100%); transition: transform .22s ease;
    }
    .workspace.detail-open .panel { transform: translateX(0); }
    .panel-header { height: 56px; display:flex; align-items:center; justify-content:space-between; padding: 0 16px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 14px; font-weight: 800; }
    .panel-body { padding: 16px; overflow: auto; display:flex; flex-direction:column; gap: 14px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .field .value, .panel textarea, .panel input, .modal input, .modal select {
      border: 1px solid var(--border); border-radius: 10px; background: var(--surface); min-height: 38px; padding: 10px 12px; color: var(--text);
    }
    .panel textarea, .modal textarea { min-height: 90px; resize: vertical; }

    .fab {
      position: fixed; right: 24px; bottom: 22px;
      width: 58px; height: 58px; border-radius: 50%; border: 0;
      background: linear-gradient(135deg, #4F46E5, #6366F1); color: white;
      font-size: 28px; cursor: pointer; box-shadow: 0 18px 34px rgba(79,70,229,.28);
      z-index: 70;
    }
    .fab:hover { transform: translateY(-2px) scale(1.01); }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(20,24,52,.26); display:none; align-items:center; justify-content:center; z-index: 80;
    }
    .modal-backdrop.open { display:flex; }
    .modal {
      width: 420px; max-width: calc(100vw - 24px); background: white; border-radius: 16px; box-shadow: var(--shadow-md); border: 1px solid var(--border);
    }
    .modal-head, .modal-foot { padding: 14px 16px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-foot { border-bottom: 0; border-top: 1px solid var(--border); justify-content:flex-end; gap: 8px; }
    .modal-body { padding: 16px; display:grid; gap: 12px; }
    .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .toast {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(24px);
      background: rgba(30,27,75,.96); color: white; padding: 10px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
      opacity: 0; pointer-events:none; transition: .18s ease; z-index: 95;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1160px) {
      :root { --lane-label-width: 126px; --ideas-width: 220px; }
      .canvas { min-width: 1280px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brandmark">MC</div>
      <div class="title">Marketing Canvas</div>
      <div class="subtitle">FY2026 · refined sleek timeline prototype</div>
      <div class="spacer"></div>
      <button class="btn small" id="ideasToggleBtn">☰ Ideas</button>
      <button class="btn small" id="exportBtn">⤓ PNG Export</button>
      <button class="btn primary small" id="quickAddTopBtn">＋ Quick Add</button>
    </div>

    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Status</span>
        <div id="statusFilters"></div>
      </div>
      <div class="divider"></div>
      <div class="filter-group">
        <span class="filter-label">Owner</span>
        <div id="ownerFilters"></div>
      </div>
      <div class="divider"></div>
      <div class="filter-group">
        <span class="filter-label">Campaign</span>
        <div id="typeFilters"></div>
      </div>
    </div>

    <div class="workspace" id="workspace">
      <aside class="ideas" id="ideasRail">
        <div class="ideas-header">
          <button class="btn small" id="ideasCollapseBtn">⇤</button>
          <div class="ideas-title">Ideas Pool</div>
          <div class="ideas-count" id="ideasCount">0</div>
        </div>
        <div class="ideas-body" id="ideasBody"></div>
      </aside>

      <main class="main">
        <div class="canvas-shell">
          <div class="canvas" id="exportCanvas">
            <section class="timeline-frame">
              <div class="timeline-toolbar">
                <div>
                  <div class="toolbar-title">Annual campaign roadmap</div>
                  <div class="toolbar-note">Slim 24px bars, stacked overlaps, magnetic snapping, detail panel, ideas rail, and export.</div>
                </div>
                <div class="spacer"></div>
                <div class="filter-group">
                  <span class="filter-label">Density</span>
                  <div class="segmented" id="densityControl">
                    <button data-density="condensed">Condensed</button>
                    <button data-density="standard" class="active">Standard</button>
                    <button data-density="comprehensive">Comprehensive</button>
                  </div>
                </div>
                <div class="filter-group">

  <script>

    const DAY_MS = 86400000;
    const DAYS_IN_YEAR = Math.round((YEAR_END - YEAR_START) / DAY_MS) + 1;
    const MIN_INLINE_WIDTH = 120;
    const LONG_PRESS_MS = 400;
    const BAR_HEIGHT = 14;
    // condensed: bar+title only (14px) | standard: bar+title+meta (34px) | comprehensive: bar+title+meta+desc (76px)

      condensed: { rowHeight: 14, lanePad: 8 },
      standard: { rowHeight: 34, lanePad: 8 },
      comprehensive: { rowHeight: 76, lanePad: 12 }

    const campaignGroups = [];

    let ideas = [
      { id: 'i1', title: 'Creator sprint around product trial stories', lane: 'content', owner: 'Priya', type: 'content', note: 'Turn 3 customer success stories into short-form series and landing-page snippets.' },

      { id: 'i4', title: 'Thought-leadership report drop', lane: 'brand', owner: 'Maya', type: 'brand', note: 'Anchor a PR burst and executive social rollout.' },

      { id: 'p3', title: 'Spring Conversion Burst', lane: 'promo', type: 'promo', status: 'Planned', owner: 'Leo', start: '2026-02-09', end: '2026-03-16', description: 'Short tactical promotion windows stacked across paid social and CRM.' },
      { id: 'p4', title: 'Launch Teaser Runway', lane: 'product-launch', type: 'product-launch', status: 'Review', owner: 'Jules', start: '2026-03-23', end: '2026-04-27', description: 'Early teaser wave to seed awareness before launch month.' },

      { id: 'p9', title: 'Midyear Retention Loop', lane: 'always-on', type: 'always-on', status: 'Active', owner: 'Leo', start: '2026-07-06', end: '2026-08-31', description: 'Lifecycle refresh with nurture segments and win-back pathways.' },
      { id: 'p10', title: 'Back-to-School Push', lane: 'promo', type: 'promo', status: 'Approved', owner: 'Leo', start: '2026-08-10', end: '2026-09-07', description: 'Offer-led campaign tuned for acquisition and reactivation.' },
      { id: 'p11', title: 'Creator Collab Capsule', lane: 'brand', type: 'brand', status: 'Planned', owner: 'Maya', start: '2026-08-24', end: '2026-09-21', description: 'Co-branded creative drop with creator amplification.' },
      { id: 'p12', title: 'Autumn Story Arc', lane: 'content', type: 'content', status: 'Review', owner: 'Priya', start: '2026-09-14', end: '2026-10-26', description: 'Longer editorial sequence bridging seasonal storytelling and product proof.' },
      { id: 'p13', title: 'Holiday Offer Engine', lane: 'promo', type: 'promo', status: 'Active', owner: 'Leo', start: '2026-11-02', end: '2026-12-21', description: 'Full-funnel offer orchestration across site, paid media, and CRM.' },
      { id: 'p14', title: 'Evergreen Gift Finder', lane: 'always-on', type: 'always-on', status: 'Planned', owner: 'Jules', start: '2026-11-09', end: '2026-12-28', description: 'Persistent merchandising and intent capture layer for peak season.' },
      { id: 'p15', title: 'Year-End Brand Film', lane: 'brand', type: 'brand', status: 'Approved', owner: 'Maya', start: '2026-12-01', end: '2026-12-28', description: 'Capstone brand expression tying together the year and setting up next year.' },
      { id: 'p16', title: 'Multi-Channel Executive Thought Leadership Social Media Blitz Campaign', lane: 'brand', type: 'brand', status: 'Planned', owner: 'Maya', start: '2026-04-06', end: '2026-04-27', description: 'Long-title test: enterprise thought leadership campaign with paid social, organic content, and executive amplification across LinkedIn, Twitter, and YouTube.' },
      { id: 'p17', title: 'Flash Sale', lane: 'promo', type: 'promo', status: 'Planned', owner: 'Leo', start: '2026-08-10', end: '2026-08-17', description: 'Short bar test: 1-week flash sale targeting dormant CRM cohorts with tiered discount ladder.' },
      { id: 'p18', title: 'Q4 Content Calendar Planning Sprint with Cross-Functional Stakeholder Alignment Workshop Series', lane: 'content', type: 'content', status: 'Review', owner: 'Priya', start: '2026-10-01', end: '2026-10-26', description: 'Three-week intensive content planning sprint that brings together product, brand, and growth teams to lock the Q4 editorial calendar. Delivers a content matrix, creative briefs, and production timeline with clear ownership and KPIs for each piece.' },
      { id: 'p19', title: 'Back-to-School Push Phase 2', lane: 'promo', type: 'promo', status: 'Active', owner: 'Jules', start: '2026-08-24', end: '2026-09-14', description: 'Overlaps with p10 — stacking test. Follow-on promotion window targeting different segments.' },
      { id: 'p20', title: 'Loyalty Push', lane: 'always-on', type: 'always-on', status: 'Active', owner: 'Leo', start: '2026-07-06', end: '2026-08-15', description: 'Overlaps with p9 — stacking test in always-on lane.' },
    ];

    const milestones = [];
    const state = {
      density: 'standard',
      snapMode: 'week',
      ideasCollapsed: false,
      selectedPlanId: null,
      laneFilter: null,
      filters: { status: new Set(), owner: new Set(), type: new Set() },
      drag: null,
      toastTimer: null,
    };

    const el = {
      workspace: document.getElementById('workspace'),
      ideasBody: document.getElementById('ideasBody'),
      ideasCount: document.getElementById('ideasCount'),
      lanes: document.getElementById('lanes'),
      months: document.getElementById('months'),
      groupLayer: document.getElementById('groupLayer'),
      milestoneLayer: document.getElementById('milestoneLayer'),
      panelBody: document.getElementById('panelBody'),
      detailPanel: document.getElementById('detailPanel'),
      snapIndicator: document.getElementById('snapIndicator'),
      snapLabel: document.getElementById('snapLabel'),
      modalBackdrop: document.getElementById('modalBackdrop'),
      toast: document.getElementById('toast'),
      timelineBody: document.getElementById('timelineBody'),
    };

    function dayIndex(dateStr) {
      const date = new Date(`${dateStr}T00:00:00`);
      return Math.max(0, Math.min(DAYS_IN_YEAR - 1, Math.round((date - YEAR_START) / DAY_MS)));
    }

    function dateFromIndex(index) {
      const d = new Date(YEAR_START.getTime() + index * DAY_MS);
      return d.toISOString().slice(0, 10);
    }

    function formatShort(dateStr) {
      const d = new Date(`${dateStr}T00:00:00`);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatLong(dateStr) {
      const d = new Date(`${dateStr}T00:00:00`);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function clampIndex(i) { return Math.max(0, Math.min(DAYS_IN_YEAR - 1, i)); }

    function snapIndex(index, mode, edge = 'start') {
      const rawDate = new Date(YEAR_START.getTime() + clampIndex(index) * DAY_MS);
      if (mode === 'none') return clampIndex(index);
      if (mode === 'week') {
        const day = rawDate.getDay();
        const mondayDiff = (day + 6) % 7;
        if (edge === 'start') rawDate.setDate(rawDate.getDate() - mondayDiff);
        else rawDate.setDate(rawDate.getDate() + (6 - mondayDiff));
      }
      if (mode === 'month') {
        if (edge === 'start') rawDate.setDate(1);
        else rawDate.setMonth(rawDate.getMonth() + 1, 0);
      }
      return clampIndex(Math.round((rawDate - YEAR_START) / DAY_MS));
    }

    function pxPerDay() {
      const track = document.querySelector('.lane-track');
      return track ? track.clientWidth / DAYS_IN_YEAR : 3.08;
    }

    function visiblePlans() {
      return plans.filter(plan => {
        const lanePass = !state.laneFilter || plan.lane === state.laneFilter;
        const statusPass = !state.filters.status.size || state.filters.status.has(plan.status);
        const ownerPass = !state.filters.owner.size || state.filters.owner.has(plan.owner);
        const typePass = !state.filters.type.size || state.filters.type.has(plan.type);
        return lanePass && statusPass && ownerPass && typePass;
      });
    }

    function computeStacks(plansForLane) {
      const density = DENSITY_META[state.density];
      const sorted = [...plansForLane].sort((a, b) => dayIndex(a.start) - dayIndex(b.start));
      const rows = [];
      const map = new Map();
      sorted.forEach(plan => {
        const start = dayIndex(plan.start);
        const end = dayIndex(plan.end);
        let rowIndex = 0;
        while (rows[rowIndex] !== undefined && start <= rows[rowIndex]) rowIndex += 1;
        rows[rowIndex] = end + 2;
        map.set(plan.id, rowIndex);
      });
      return { map, height: Math.max(88, density.lanePad * 2 + Math.max(1, rows.length) * density.rowHeight) };
    }

    function buildMonths() {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      el.months.innerHTML = months.map((m, i) => `<div class="month" data-quarter="Q${Math.floor(i/3)+1}">${m}</div>`).join('');
    }

    function renderFilterChips(targetId, items, kind, colorMap = {}) {
      const root = document.getElementById(targetId);
      root.innerHTML = items.map(item => {
        const activeSet = state.filters[kind];
        const active = activeSet.has(item);
        const dimmed = activeSet.size && !active;
        const dot = colorMap[item] ? `<span class="dot" style="background:${colorMap[item]}"></span>` : '';
        return `<button class="chip ${active ? 'active' : ''} ${dimmed ? 'dimmed' : ''}" data-kind="${kind}" data-value="${item}">${dot}${item}</button>`;
      }).join('');
    }

    function renderIdeas() {
      el.ideasCount.textContent = ideas.length;
      el.ideasBody.innerHTML = ideas.map(idea => `
        <div class="idea-card" data-idea-id="${idea.id}">
          <div class="idea-title-row">
            <div class="idea-bulb">💡</div>
            <div>
              <div class="idea-name">${idea.title}</div>
              <div class="idea-meta">
                <span class="tag">${laneMeta.find(l => l.id === idea.lane)?.name}</span>
                <span class="tag">${idea.owner}</span>
                <span class="tag">${idea.type}</span>
              </div>
            </div>
          </div>
          <div class="idea-note">${idea.note}</div>
        </div>
      `).join('');
    }

    function getPlanWidth(plan, trackWidth) {
      const start = dayIndex(plan.start);
      const end = dayIndex(plan.end);
      const width = ((end - start + 1) / DAYS_IN_YEAR) * trackWidth;
      return Math.max(38, width);
    }

    function getLaneTrackClass() {
      return state.snapMode === 'month' ? 'lane-track month-snap' : 'lane-track';
    }

    function renderTimeline() {
      const shown = visiblePlans();
      const trackWidth = Math.max(1080, (document.querySelector('.timeline-frame')?.clientWidth || 1228) - 148);
      const laneHtml = laneMeta.map(lane => {
        const lanePlans = shown.filter(p => p.lane === lane.id);
        const stack = computeStacks(lanePlans);
        const laneOnly = state.laneFilter === lane.id;
        const cards = lanePlans.map(plan => {
          const start = dayIndex(plan.start);
          const left = (start / DAYS_IN_YEAR) * trackWidth;
          const barWidth = getPlanWidth(plan, trackWidth);
          const rowH = DENSITY_META[state.density].rowHeight;
          const row = stack.map.get(plan.id) || 0;
          const top = DENSITY_META[state.density].lanePad + row * rowH;
          const selected = state.selectedPlanId === plan.id ? 'selected' : '';
          const statusColor = statusColors[plan.status] || '#94A3B8';
          const sc = 'style="color:' + statusColor + '"';
          const dateText = formatShort(plan.start) + '\u2013' + formatShort(plan.end);
          const showDates = barWidth >= 180;
          const density = state.density;

          // Title: inside bar if fits, outside if too long
          const titleInside = barWidth >= 160;
          const titleInBar = titleInside
            ? '<span class="plan-title-in">' + plan.title + '</span>'
            : '';
          const titleOutside = !titleInside
            ? '<span class="plan-title-out">' + plan.title + '</span>'
            : '';
          const dateInBar = showDates
            ? '<span class="plan-dates">' + dateText + '</span>'
            : '';

          // Meta tags: single row, no wrapping
          const metaRow = density !== 'condensed'
            ? '<div class="density-extra"><span class="meta-pill">' + lane.name + '</span><span class="meta-pill" ' + sc + '>' + plan.status + '</span><span class="meta-pill">' + plan.owner + '</span></div>'
            : '';

          // Description: comprehensive only, max 3 rows
          const descRow = density === 'comprehensive' && plan.description
            ? '<div class="plan-desc">' + plan.description + '</div>'
            : '';

          return '<div class="plan ' + selected + '" data-plan-id="' + plan.id + '" style="left:' + left + 'px;top:' + top + 'px;width:' + barWidth + 'px;">' +
            '<div class="plan-bar-row">' +
              '<div class="plan-bar" style="background:' + (typeColors[plan.type] || '#94A3B8') + ';width:' + barWidth + 'px;height:14px;">' +
                '<div class="resize-handle left"></div>' +
                titleInBar +
                dateInBar +
                '<div class="resize-handle right"></div>' +
              '</div>' +
              titleOutside +
            '</div>' +
            metaRow +
            descRow +
          '</div>';
        }).join('');

        return `
          <section class="lane" data-lane-id="${lane.id}" style="min-height:${stack.height}px;">
            <div class="lane-label ${laneOnly ? 'active-filter' : ''}" data-lane-label="${lane.id}">
              <div class="lane-title">${lane.name}</div>
              <div class="lane-sub">${lane.hint}</div>
            </div>
            <div class="${getLaneTrackClass()}" data-lane-track="${lane.id}" style="min-height:${stack.height}px; width:${trackWidth}px;">
              ${cards}
            </div>
          </section>
        `;
      }).join('');

      el.lanes.innerHTML = laneHtml;
                  renderPanel();
      syncControls();
    }

    function renderGroups() {
      const shown = visiblePlans();
      const tracks = document.querySelectorAll('.lane');
      const frameRect = el.timelineBody.getBoundingClientRect();
      const firstTrack = document.querySelector('.lane-track');
      if (!firstTrack) return;
      const trackWidth = firstTrack.clientWidth;
      let html = '';
      campaignGroups.forEach(group => {
        const members = shown.filter(p => p.groupId === group.id);
        if (!members.length) return;
        const memberLanes = group.lanes.filter(id => shown.some(p => p.groupId === group.id && p.lane === id));
        const firstLane = document.querySelector(`.lane[data-lane-id="${memberLanes[0]}"]`);
        const lastLane = document.querySelector(`.lane[data-lane-id="${memberLanes[memberLanes.length - 1]}"]`);
        if (!firstLane || !lastLane) return;
        const top = firstLane.offsetTop + 6;
        const left = (dayIndex(group.start) / DAYS_IN_YEAR) * trackWidth + 8;
        const width = ((dayIndex(group.end) - dayIndex(group.start) + 1) / DAYS_IN_YEAR) * trackWidth - 16;
        html += `<div class="group-band" style="top:${top}px; left:${left}px; width:${Math.max(80, width)}px; color:${group.color}; background:${hexToRgba(group.color,0.09)}; border-color:${hexToRgba(group.color,0.2)};">${group.name}</div>`;
      });
      el.groupLayer.innerHTML = html;
      el.groupLayer.style.height = `${tracks.length ? el.lanes.scrollHeight : 0}px`;
    }

    function renderMilestones() {
      const firstTrack = document.querySelector('.lane-track');
      if (!firstTrack) return;
      const trackWidth = firstTrack.clientWidth;
      const totalHeight = el.lanes.scrollHeight;
      el.milestoneLayer.style.height = `${totalHeight}px`;
      el.milestoneLayer.innerHTML = milestones.map(ms => {
        const left = (dayIndex(ms.date) / DAYS_IN_YEAR) * trackWidth;
        return `<div class="milestone" style="left:${left}px;"><div class="milestone-label">${ms.name}</div></div>`;
      }).join('');
    }

    function renderPanel() {
      const plan = plans.find(p => p.id === state.selectedPlanId);
      if (!plan) {
        el.workspace.classList.remove('detail-open');
        el.panelBody.innerHTML = '<div class="field"><label>Nothing selected</label><div class="value">Double-click a timeline bar to inspect a plan.</div></div>';
        return;
      }
      el.workspace.classList.add('detail-open');
      el.panelBody.innerHTML = `
        <div class="field"><label>Title</label><div class="value">${plan.title}</div></div>
        <div class="field"><label>Date range</label><div class="value">${formatLong(plan.start)} — ${formatLong(plan.end)}</div></div>
        <div class="field"><label>Lane</label><div class="value">${laneMeta.find(l => l.id === plan.lane)?.name}</div></div>
        <div class="field"><label>Status</label><div class="value">${plan.status}</div></div>
        <div class="field"><label>Owner</label><div class="value">${plan.owner}</div></div>
        <div class="field"><label>Campaign type</label><div class="value">${plan.type}</div></div>
        <div class="field"><label>Campaign group</label><div class="value">${campaignGroups.find(g => g.id === plan.groupId)?.name || 'Standalone'}</div></div>
        <div class="field"><label>Description</label><div class="value">${plan.description}</div></div>
      `;
    }

    function syncControls() {
      document.querySelectorAll('#densityControl button').forEach(btn => btn.classList.toggle('active', btn.dataset.density === state.density));
      document.querySelectorAll('#snapControl button').forEach(btn => btn.classList.toggle('active', btn.dataset.snap === state.snapMode));
      document.querySelectorAll('.lane-label').forEach(btn => btn.classList.toggle('active-filter', btn.dataset.laneLabel === state.laneFilter));
      renderFilterChips('statusFilters', statuses, 'status');
      renderFilterChips('ownerFilters', owners, 'owner');
      renderFilterChips('typeFilters', laneMeta.map(l => l.id), 'type', Object.fromEntries(laneMeta.map(l => [l.id, typeColors[l.id]])));
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => el.toast.classList.remove('show'), 1800);
    }

    function openModal(prefill = {}) {
      el.modalBackdrop.classList.add('open');
      document.getElementById('newTitle').value = prefill.title || '';
      document.getElementById('newStart').value = prefill.start || '2026-09-01';
      document.getElementById('newEnd').value = prefill.end || '2026-09-21';
      document.getElementById('newLane').value = prefill.lane || laneMeta[0].id;
      document.getElementById('newOwner').value = prefill.owner || owners[0];
      document.getElementById('newType').value = prefill.type || laneMeta[0].id;
    }
    function closeModal() { el.modalBackdrop.classList.remove('open'); }

    function createPlanFromModal() {
      const title = document.getElementById('newTitle').value.trim();
      const start = document.getElementById('newStart').value;
      const end = document.getElementById('newEnd').value;
      const lane = document.getElementById('newLane').value;
      const owner = document.getElementById('newOwner').value;
      const type = document.getElementById('newType').value;
      if (!title || !start || !end) return showToast('Add title and dates first');
      plans.push({
        id: `p${Math.random().toString(36).slice(2,7)}`,
        title, start, end, lane, owner, type,
        status: 'Planned',
        description: 'Newly added from the quick-add modal.',
        groupId: null,
      });
      closeModal();
      renderTimeline();
      showToast('Plan added');
    }

    function convertIdea(ideaId) {
      const idx = ideas.findIndex(i => i.id === ideaId);
      if (idx === -1) return;
      const idea = ideas.splice(idx, 1)[0];
      plans.push({
        id: `p${Math.random().toString(36).slice(2,7)}`,
        title: idea.title,
        lane: idea.lane,
        type: idea.type,
        owner: idea.owner,
        status: 'Planned',
        start: '2026-10-05',
        end: '2026-10-26',
        description: idea.note,
        groupId: null,
      });
      renderIdeas();
      renderTimeline();
      showToast('Idea converted into plan');
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getLaneTrackAtPoint(clientX, clientY) {
      return Array.from(document.querySelectorAll('.lane-track')).find(track => {
        const rect = track.getBoundingClientRect();
        return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
      }) || null;
    }

    function getTrackMetrics(track) {
      const rect = track.getBoundingClientRect();
      return { trackRect: rect, ppd: track.clientWidth / DAYS_IN_YEAR };
    }

    function startDrag(planId, mode, edge, pointerEvent) {
      const plan = plans.find(p => p.id === planId);
      const node = document.querySelector(`.plan[data-plan-id="${planId}"]`);
      const track = node.closest('.lane-track');
      const { trackRect, ppd } = getTrackMetrics(track);
      const originStart = dayIndex(plan.start);
      const originEnd = dayIndex(plan.end);
      const pointerX = pointerEvent.clientX;
      state.drag = {
        planId, mode, edge, pointerX, originStart, originEnd, trackRect, ppd,
        duration: originEnd - originStart,
        laneId: plan.lane,
      };
      node.classList.add(mode === 'move' ? 'dragging' : 'resizing');
      showIndicator(originStart, edge || 'start', trackRect, ppd);
      window.addEventListener('pointermove', onDragMove);
      window.addEventListener('pointerup', endDrag);
    }

    function showIndicator(index, edge, rect, ppd) {
      const snapped = snapIndex(index, state.snapMode, edge);
      const left = snapped * ppd;
      el.snapIndicator.classList.add('visible');
      el.snapIndicator.style.left = `${left}px`;
      el.snapLabel.textContent = formatLong(dateFromIndex(snapped));
    }

    function hideIndicator() { el.snapIndicator.classList.remove('visible'); }

    function onDragMove(e) {
      if (!state.drag) return;
      const { planId, mode, edge, pointerX, originStart, originEnd, duration } = state.drag;
      const plan = plans.find(p => p.id === planId);

      if (mode === 'move') {
        const overTrack = getLaneTrackAtPoint(e.clientX, e.clientY);
        if (overTrack && overTrack.dataset.laneTrack !== plan.lane) {
          plan.lane = overTrack.dataset.laneTrack;
          state.drag.laneId = plan.lane;
          const metrics = getTrackMetrics(overTrack);
          state.drag.trackRect = metrics.trackRect;
          state.drag.ppd = metrics.ppd;
        }
      }

      const { ppd, trackRect } = state.drag;
      const deltaDays = Math.round((e.clientX - pointerX) / ppd);
      let nextStart = originStart;
      let nextEnd = originEnd;

      if (mode === 'move') {
        nextStart = snapIndex(originStart + deltaDays, state.snapMode, 'start');
        nextEnd = nextStart + duration;
        if (nextEnd >= DAYS_IN_YEAR) {
          nextEnd = DAYS_IN_YEAR - 1;
          nextStart = Math.max(0, nextEnd - duration);
        }
        showIndicator(nextStart, 'start', trackRect, ppd);
      } else if (edge === 'start') {
        nextStart = snapIndex(originStart + deltaDays, state.snapMode, 'start');
        nextStart = Math.min(nextStart, originEnd - 1);
        showIndicator(nextStart, 'start', trackRect, ppd);
      } else {
        nextEnd = snapIndex(originEnd + deltaDays, state.snapMode, 'end');
        nextEnd = Math.max(nextEnd, originStart + 1);
        showIndicator(nextEnd, 'end', trackRect, ppd);
      }

      plan.start = dateFromIndex(clampIndex(nextStart));
      plan.end = dateFromIndex(clampIndex(nextEnd));
      renderTimeline();
      const activeTrack = document.querySelector(`.lane-track[data-lane-track="${plan.lane}"]`);
      if (activeTrack) {
        const metrics = getTrackMetrics(activeTrack);
        state.drag.trackRect = metrics.trackRect;
        state.drag.ppd = metrics.ppd;
      }
      const node = document.querySelector(`.plan[data-plan-id="${planId}"]`);
      if (node) node.classList.add(mode === 'move' ? 'dragging' : 'resizing');
    }

    function endDrag() {
      if (!state.drag) return;
      document.querySelectorAll('.plan.dragging, .plan.resizing').forEach(n => n.classList.remove('dragging','resizing'));
      hideIndicator();
      state.drag = null;
      window.removeEventListener('pointermove', onDragMove);
      window.removeEventListener('pointerup', endDrag);
      renderPanel();
    }

    function wirePlanInteractions() {
      document.querySelectorAll('.plan').forEach(planEl => {
        let timer = null;
        let armed = false;
        const planId = planEl.dataset.planId;

        planEl.addEventListener('dblclick', e => {
          if (e.target.classList.contains('resize-handle')) return;
          state.selectedPlanId = planId;
          renderTimeline();
        });

        planEl.addEventListener('pointerdown', e => {
          if (e.target.classList.contains('resize-handle')) return;
          armed = false;
          timer = setTimeout(() => {
            armed = true;
            planEl.classList.add('drag-armed');
            startDrag(planId, 'move', null, e);
          }, LONG_PRESS_MS);
        });

        planEl.addEventListener('pointerup', () => {
          clearTimeout(timer);
          planEl.classList.remove('drag-armed');
        });
        planEl.addEventListener('pointerleave', () => {
          if (!armed) clearTimeout(timer);
          planEl.classList.remove('drag-armed');
        });

        planEl.querySelectorAll('.resize-handle').forEach(handle => {
          handle.addEventListener('pointerdown', e => {
            e.stopPropagation();
            const edge = handle.dataset.edge;
            startDrag(planId, 'resize', edge, e);
          });
        });
      });
    }

    function buildSelects() {
      document.getElementById('newLane').innerHTML = laneMeta.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
      document.getElementById('newOwner').innerHTML = owners.map(o => `<option value="${o}">${o}</option>`).join('');
      document.getElementById('newType').innerHTML = laneMeta.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
    }

    function exportPng() {
      html2canvas(document.getElementById('exportCanvas'), { backgroundColor: '#F5F6FA', scale: 2, useCORS: true }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'marketing-canvas-refined.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('PNG exported');
      });
    }

    function wireGlobalEvents() {
      document.body.addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (chip) {
          const { kind, value } = chip.dataset;
          const set = state.filters[kind];
          if (set.has(value)) set.delete(value); else set.add(value);
          renderTimeline();
          return;
        }

        const laneLabel = e.target.closest('[data-lane-label]');
        if (laneLabel) {
          const laneId = laneLabel.dataset.laneLabel;
          state.laneFilter = state.laneFilter === laneId ? null : laneId;
          renderTimeline();
          return;
        }

        const idea = e.target.closest('[data-idea-id]');
        if (idea) convertIdea(idea.dataset.ideaId);
      });

      document.getElementById('densityControl').addEventListener('click', e => {
        if (!e.target.dataset.density) return;
        state.density = e.target.dataset.density;
        renderTimeline();
      });
      document.getElementById('snapControl').addEventListener('click', e => {
        if (!e.target.dataset.snap) return;
        state.snapMode = e.target.dataset.snap;
        renderTimeline();
      });

      document.getElementById('ideasCollapseBtn').addEventListener('click', () => {
        state.ideasCollapsed = !state.ideasCollapsed;
        el.workspace.classList.toggle('ideas-collapsed', state.ideasCollapsed);
      });
      document.getElementById('ideasToggleBtn').addEventListener('click', () => {
        state.ideasCollapsed = !state.ideasCollapsed;
        el.workspace.classList.toggle('ideas-collapsed', state.ideasCollapsed);
      });

      document.getElementById('exportBtn').addEventListener('click', exportPng);
      document.getElementById('fab').addEventListener('click', () => openModal());
      document.getElementById('quickAddTopBtn').addEventListener('click', () => openModal());
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
      document.getElementById('createPlanBtn').addEventListener('click', createPlanFromModal);
      document.getElementById('closePanelBtn').addEventListener('click', () => {
        state.selectedPlanId = null;
        renderTimeline();
      });
      el.modalBackdrop.addEventListener('click', e => {
        if (e.target === el.modalBackdrop) closeModal();
      });
      window.addEventListener('resize', renderTimeline);
    }

    function renderAll() {
      renderIdeas();
      renderTimeline();
      wirePlanInteractions();
    }

    buildMonths();
    buildSelects();
    renderFilterChips('statusFilters', statuses, 'status');
    renderFilterChips('ownerFilters', owners, 'owner');
    renderFilterChips('typeFilters', laneMeta.map(l => l.id), 'type', Object.fromEntries(laneMeta.map(l => [l.id, typeColors[l.id]])));
    wireGlobalEvents();
    renderAll();

    const observer = new MutationObserver(() => wirePlanInteractions());
    observer.observe(el.lanes, { childList: true, subtree: true });
  </script>
</body>
</html>
